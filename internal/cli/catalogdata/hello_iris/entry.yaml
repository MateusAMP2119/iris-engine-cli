id: hello_iris
name: Hello Iris
pitch: Upsert the seven rainbow colors and ask a row who wrote it.
description: |
  The canonical first pipeline: a tiny POSIX-sh script speaks the engine's
  turn protocol, answering every run frame with the seven rainbow colors as
  row frames that the engine upserts into demo.colors. The primary keys are
  fixed, so re-running layers a second provenance stamp on the same seven
  rows — that layering is the provenance lesson the tour ends on.
run_note: the script answers the seven rainbow colors as row frames and the engine upserts them into demo.colors; re-running layers a second provenance stamp on the same rows
showcase:
  table: demo.colors
  pk: green
