id: word_frequency
name: Word Frequency
pitch: Count every word of an 1891 Dickinson poem with plain POSIX text tools.
description: |
  A computation from nothing but POSIX text tools: Emily Dickinson's "Hope is
  the thing with feathers" (Poems, 1891) is embedded in the script, which
  splits, lowercases, and counts every word, answering the counts as row
  frames that the engine upserts into demo.word_counts. The poem is fixed, so
  the counts are deterministic: every run produces the same rows under a new
  provenance stamp — ask the row 'hope' who wrote it.
run_note: the script splits and counts the embedded 1891 poem and answers the counts as row frames the engine upserts into demo.word_counts; the counts are deterministic, so re-running layers a new provenance stamp on the same rows
showcase:
  table: demo.word_counts
  pk: hope
